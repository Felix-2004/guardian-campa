kind = "web"
previewPath = "/"
title = "Guardian Companion"
version = "1.0.0"
id = "artifacts/guardian-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25443
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/guardian-companion run dev"

[services.env]
PORT = "25443"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/guardian-companion", "run", "build"]
publicDir = "artifacts/guardian-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
